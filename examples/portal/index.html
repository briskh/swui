<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWUI Portal</title>
    <script>
      (function () {
        try {
          var preference = localStorage.getItem("swui-theme-preference");
          var theme = preference === "light" || preference === "dark" ? preference : matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          var root = document.documentElement;
          root.dataset.theme = theme;
          root.classList.toggle("dark", theme === "dark");
          root.style.colorScheme = theme;
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
