name: Quality gates

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bun run sync-docs
      - run: bun run sync-docs:check
      - run: bun run check:catalog-export
      - run: bun run --filter '@swqt/ui-consumer-example' typecheck
      - run: bun run --filter '@swqt/portal-example' typecheck
      - run: bun run --filter '@swqt/portal-example' test
      - run: bun run --filter '@swqt/portal-example' mcp:smoke
      - run: bun run check:design-contract
      - run: bun run example:build
      - run: bun run portal:build
      - run: bun run --filter '@swqt/ui-consumer-example' test:browser
      - run: bun run --filter '@swqt/portal-example' test:browser
      - run: bun run verify:packed-consumer
