# Publish @swqt/ui-tokens and @swqt/ui to registry.npmjs.org via npm Trusted Publishing (OIDC).
#
# One-time npmjs.com setup (per package, after the package exists or via @swqt org settings):
#   Package → Settings → Trusted Publisher → GitHub Actions
#     Organization/user: briskh
#     Repository: swui
#     Workflow filename: publish-npm.yml
#     Environment: (leave blank)
#
# Do NOT store NPM_TOKEN in repo secrets for this workflow — OIDC replaces it.
# First publish may require a one-time manual `npm publish` from a maintainer account
# if trusted publisher cannot be bound before the package name exists.
#
# Do NOT set setup-node `registry-url` here: it writes an empty NODE_AUTH_TOKEN
# placeholder that can skip the OIDC exchange and surface as E404 on publish.
name: Publish npm packages

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run only (no upload)
        type: boolean
        default: false
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Use npm with Trusted Publishing support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Preflight pack + consumer verification
        run: |
          bun run pack
          bun run check:npm-publish-audit
          bun run verify:packed-consumer

      - name: Publish @swqt/ui-tokens
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        working-directory: packages/ui-tokens
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@swqt/ui-tokens@${VERSION}" version >/dev/null 2>&1; then
            echo "@swqt/ui-tokens@${VERSION} already published; skipping"
          else
            npm publish --provenance --access public
          fi

      - name: Dry-run @swqt/ui-tokens
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        working-directory: packages/ui-tokens
        run: npm publish --dry-run --provenance --access public

      - name: Publish @swqt/ui
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        working-directory: packages/ui
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@swqt/ui@${VERSION}" version >/dev/null 2>&1; then
            echo "@swqt/ui@${VERSION} already published; skipping"
          else
            npm publish --provenance --access public
          fi

      - name: Dry-run @swqt/ui
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        working-directory: packages/ui
        run: npm publish --dry-run --provenance --access public
